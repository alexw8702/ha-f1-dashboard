<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dunkler Hintergrund mit Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f24;stop-opacity:1" />
    </linearGradient>
    <!-- Accent-Farben für das Auto -->
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4d63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ed1131;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <circle cx="128" cy="128" r="128" fill="url(#bgGrad)"/>

  <!-- Streckenlinie im Hintergrund (subtil) -->
  <path d="M 30 128 Q 80 60, 128 50 Q 176 60, 226 128" 
        fill="none" stroke="#1a3a52" stroke-width="1" opacity="0.3"/>

  <!-- F1-Auto (stylisiert, Seitenansicht, nach links fahrend) -->
  <g transform="translate(128, 128)">
    <!-- Hinteres Abtriebsflügel -->
    <rect x="55" y="-18" width="3" height="36" fill="#00e6c3" opacity="0.7"/>
    <polygon points="58,-15 65,-20 65,20 58,15" fill="#00e6c3" opacity="0.6"/>

    <!-- Hinterrad -->
    <circle cx="45" cy="15" r="8" fill="none" stroke="#f3f4f7" stroke-width="2"/>
    <circle cx="45" cy="15" r="5" fill="#0a0e10"/>
    <line x1="42" y1="15" x2="48" y2="15" stroke="#666" stroke-width="1"/>
    <line x1="45" y1="12" x2="45" y2="18" stroke="#666" stroke-width="1"/>

    <!-- Chassi/Monocoque (Hauptkarosserie) -->
    <path d="M 20,-8 L 40,-10 L 50,-6 L 50,6 L 40,10 L 20,8 Z" 
          fill="url(#carGrad)" filter="url(#glow)"/>

    <!-- Cockpit-Bereich (Airbox) -->
    <path d="M 25,-8 L 32,-12 L 38,-12 L 40,-8" 
          fill="#1a1f24" stroke="#00e6c3" stroke-width="1.5" opacity="0.8"/>

    <!-- Vorderes Abtriebsflügel -->
    <rect x="-60" y="-16" width="3" height="32" fill="#00e6c3" opacity="0.7"/>
    <polygon points="-60,-12 -70,-18 -70,18 -60,12" fill="#00e6c3" opacity="0.6"/>

    <!-- Vorderrad -->
    <circle cx="-45" cy="14" r="8" fill="none" stroke="#f3f4f7" stroke-width="2"/>
    <circle cx="-45" cy="14" r="5" fill="#0a0e10"/>
    <line x1="-48" y1="14" x2="-42" y2="14" stroke="#666" stroke-width="1"/>
    <line x1="-45" y1="11" x2="-45" y2="17" stroke="#666" stroke-width="1"/>

    <!-- Lenkung (Lenker oben sichtbar) -->
    <circle cx="15" cy="-10" r="2" fill="#f4c61a"/>

    <!-- Nase/Frontflügel-Pylon -->
    <path d="M -65,-10 L -50,-8 L -50,8 L -65,10 Z" 
          fill="#1a1f24" stroke="#00e6c3" stroke-width="1" opacity="0.7"/>

    <!-- Halo (Kopfschutz) - stilisiert -->
    <path d="M 20,-12 Q 25,-18 30,-18 Q 32,-18 32,-15" 
          fill="none" stroke="#f3f4f7" stroke-width="1.5" opacity="0.6"/>

    <!-- Akzent-Streifen (Racing-Linie) -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#f4c61a" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Äußerer Ring/Rahmen -->
  <circle cx="128" cy="128" r="128" fill="none" stroke="#00e6c3" stroke-width="1" opacity="0.3"/>

  <!-- Innerer Akzent-Ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#ed1131" stroke-width="0.5" opacity="0.2"/>
</svg>